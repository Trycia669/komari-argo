name: 🐳 publish-to-ghcr
on:
  push:
    branches: [ main ]
    paths:
      - repo.conf
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      komari_version:
        description: "指定上游版本号 (留空则自动获取上游最新版)"
        required: false
        default: ""

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_SUFFIX: kome
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🧭 Set image metadata
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${OWNER}/${IMAGE_SUFFIX}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.komari_version }}" ]; then
            VERSION="${{ github.event.inputs.komari_version }}"
          else
            VERSION=$(curl -s https://api.github.com/repos/komari-monitor/komari/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
            if [ -z "$VERSION" ]; then
              VERSION="latest"
            fi
          fi
          echo "本次构建对应的上游版本为: $VERSION"
          echo "KOMARI_VERSION=$VERSION" >> "$GITHUB_ENV"

          # 修复问题2：版本 tag 在这里条件拼接，避免 build-push-action 收到空行
          if [ "$VERSION" != "latest" ]; then
            echo "EXTRA_TAG=${IMAGE_NAME}:${VERSION}" >> "$GITHUB_ENV"
          else
            echo "EXTRA_TAG=" >> "$GITHUB_ENV"
          fi

      - name: 🏷️ Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.EXTRA_TAG }}
          build-args: |
            KOMARI_VERSION=${{ env.KOMARI_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
